<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الريهام تورز | حجز طيران</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: var(--navy); overflow-x: hidden; }
    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-link { color: white; font-weight: 700; transition: 0.3s; font-size: 0.95rem; position: relative; }
    .nav-link:hover { color: var(--brand); }
    .lang-btn { width: 36px; height: 36px; border-radius: 50%; font-weight: 900; font-size: 11px; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
    .lang-btn-active { background: var(--brand) !important; box-shadow: 0 4px 12px rgba(242,101,34,0.4); }
    .hero-wrap { position: relative; padding: 140px 20px 60px; background: linear-gradient(rgba(6,21,44,0.8), rgba(6,21,44,0.9)), url('flight background.jpg') center/cover; overflow: hidden; }
    .widget-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.2); border-top: 5px solid var(--brand); }
    .input-group { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; padding: 0.8rem 1.25rem; }
    .album-card { overflow: hidden; border-radius: 2rem; background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); cursor: zoom-in; transition: 0.4s; }
    .album-card img { width: 100%; height: 400px; object-fit: cover; transition: 0.6s; }
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: 0.3s; }
    #lightbox.active { display: flex; opacity: 1; }
  </style>
</head>
<body class="pb-24">
  <div id="toast-container" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[200] flex flex-col gap-3 w-[90%] max-w-md pointer-events-none"></div>

  <nav id="navbar" class="fixed top-0 inset-x-0 z-[100] glass-nav py-4">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="w-12 h-12 bg-white rounded-xl p-1 shadow-lg"><img src="logo.png" class="w-full h-full object-contain"></a>
        <div class="hidden sm:block text-white font-black text-xl">الريهام تورز</div>
      </div>
      <div class="flex bg-white/5 p-1 rounded-full border border-white/10">
        <button onclick="setLanguage('ar')" id="btn-ar" class="lang-btn">AR</button>
        <button onclick="setLanguage('en')" id="btn-en" class="lang-btn">EN</button>
        <button onclick="setLanguage('ru')" id="btn-ru" class="lang-btn">RU</button>
        <button onclick="setLanguage('de')" id="btn-de" class="lang-btn">DE</button>
      </div>
    </div>
  </nav>

  <header class="hero-wrap text-center text-white">
    <h1 id="h-title" class="text-5xl md:text-7xl font-black mb-4 drop-shadow-2xl">حجز طيران</h1>
    <p id="h-sub" class="text-xl opacity-90 mb-10">داخلي ودولي بأفضل الأسعار</p>
    
    <div class="widget-box max-w-5xl mx-auto p-6 md:p-8">
      <form onsubmit="event.preventDefault();">
        <div class="grid md:grid-cols-3 gap-4 mb-4">
          <div class="input-group text-right"><label class="text-xs text-[#F26522] font-bold block mb-1">من</label><input id="w-from" type="text" placeholder="مطار الإقلاع" class="bg-transparent w-full outline-none font-bold"></div>
          <div class="input-group text-right"><label class="text-xs text-[#F26522] font-bold block mb-1">إلى</label><input id="w-to" type="text" placeholder="وجهتك" class="bg-transparent w-full outline-none font-bold"></div>
          <div class="input-group text-right"><label class="text-xs text-[#F26522] font-bold block mb-1">التاريخ</label><input id="w-date" type="text" placeholder="ذهاب - عودة" class="bg-transparent w-full outline-none font-bold"></div>
        </div>
        <div class="grid md:grid-cols-3 gap-4">
          <div class="input-group text-right"><label class="text-xs text-[#F26522] font-bold block mb-1">رقم الهاتف</label><input id="w-phone" type="tel" placeholder="رقمك للتواصل" class="bg-transparent w-full outline-none font-bold"></div>
          <div class="input-group text-right"><label class="text-xs text-[#F26522] font-bold block mb-1">الإيميل</label><input id="w-email" type="email" placeholder="بريدك الإلكتروني" class="bg-transparent w-full outline-none font-bold"></div>
          <button type="button" onclick="sendBooking()" class="bg-[#F26522] rounded-2xl font-black text-xl hover:bg-[#d9531e] transition py-4">احجز الآن</button>
        </div>
      </form>
    </div>
  </header>

  <section class="py-20 px-6 max-w-7xl mx-auto">
    <div id="promo-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
  </section>

  <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[130] bg-[#06152c]/90 backdrop-blur-xl p-1.5 rounded-full shadow-2xl border border-white/10 flex items-center gap-1">
    <a href="flights.html" class="px-6 py-2.5 rounded-full font-black text-sm bg-[#F26522] text-white">✈️ الطيران</a>
    <a href="domestic-trips.html" class="px-6 py-2.5 rounded-full font-black text-sm text-white/70 hover:text-white">📍 رحلات داخلية</a>
  </div>

  <script>
    const trans = {
      ar: { from: "من", to: "إلى", date: "التاريخ", phone: "رقم الهاتف", email: "الإيميل", send: "احجز الآن", items: [
        {name: "دبي", img: "3.png", tag: "الخليج"}, {name: "تركيا", img: "6.png", tag: "تاريخ"}, {name: "أوروبا", img: "14.png", tag: "سياحة"}, {name: "المالديف", img: "15.png", tag: "استجمام"}
      ]},
      en: { from: "From", to: "To", date: "Date", phone: "Phone", email: "Email", send: "Book Now", items: [
        {name: "Dubai", img: "3.png", tag: "Gulf"}, {name: "Turkey", img: "6.png", tag: "History"}, {name: "Europe", img: "14.png", tag: "Tourism"}, {name: "Maldives", img: "15.png", tag: "Relax"}
      ]}
    };

    function sendBooking() {
      const data = { from: document.getElementById('w-from').value, to: document.getElementById('w-to').value, phone: document.getElementById('w-phone').value };
      if(!data.phone) return;
      // Fire and forget
      fetch('https://script.google.com/macros/s/AKfycbxGgySg1t6yVUE_d6Ib2AjJU__Rm18KC44SlPkCOIrW9fvSGsKTJBapuYQ7ju2R43fQfw/exec', { method: 'POST', body: new URLSearchParams(data), mode: 'no-cors' });
      window.open(`https://wa.me/201002429863?text=طلب حجز طيران من: ${data.from} إلى: ${data.to}`, "_blank");
    }

    function setLanguage(l) {
      const t = trans[l] || trans.ar;
      document.getElementById('promo-grid').innerHTML = t.items.map(i => `
        <div class="album-card group">
          <img src="${i.img}" loading="lazy">
          <div class="p-6">
            <span class="bg-[#F26522] text-white text-xs px-3 py-1 rounded-full font-bold">${i.tag}</span>
            <h3 class="text-2xl font-black mt-2">${i.name}</h3>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('lang-btn-active'));
      document.getElementById('btn-'+l).classList.add('lang-btn-active');
    }
    setLanguage('ar');
  </script>
</body>
</html>
