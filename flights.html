  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: var(--navy); overflow-x: hidden; }
    
    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-link { color: white; font-weight: 700; transition: 0.3s; font-size: 0.9rem; white-space: nowrap; }
    .nav-link:hover, .nav-link-active { color: var(--brand); }
    
    .lang-btn { width: 36px; height: 36px; border-radius: 50%; font-weight: 900; font-size: 11px; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .lang-btn-active { background: var(--brand) !important; transform: scale(1.1); box-shadow: 0 4px 12px rgba(242,101,34,0.4); }

    .hero-wrap { 
      position: relative; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: linear-gradient(rgba(6,21,44,0.5), rgba(6,21,44,0.8)), url('flight background.jpg') center/cover;
      padding: 120px 20px 60px; overflow: hidden;
    }

    @keyframes flyAcross {
      0% { transform: translate(-20vw, 20vh) scale(0.6) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.6; } 100% { transform: translate(110vw, -15vh) scale(1.1) rotate(-10deg); opacity: 0; }
    }
    .flying-plane { position: absolute; top: 15%; left: -10%; width: clamp(250px, 35vw, 500px); opacity: 0.6; animation: flyAcross 25s linear infinite; pointer-events: none; z-index: 5; }

    .widget-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 2.5rem; border-top: 5px solid var(--brand); box-shadow: 0 25px 50px rgba(0,0,0,0.4); position: relative; z-index: 10; }
    .input-group { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; padding: 0.8rem 1.25rem; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
    .input-group:focus-within { border-color: var(--brand); background: rgba(0, 0, 0, 0.45); }
    .input-group input { background: transparent; width: 100%; outline: none; color: white; font-weight: 700; }
    .input-group svg { color: var(--brand); flex-shrink: 0; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    
    .promo-card { overflow: hidden; border-radius: 2rem; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s; cursor: pointer; border: 1px solid #f1f5f9; }
    .promo-card:hover { transform: translateY(-8px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(242,101,34,0.1); }

    footer { background: #040d1a; color: white; padding: 70px 20px 30px; }
    .footer-link { color: rgba(255,255,255,0.6); transition: 0.3s; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.9rem; text-align: right; }
    .footer-link:hover { color: var(--brand); }
    .social-btn { width: 45px; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; transition: 0.3s; color: white; }
    .social-btn:hover { background: var(--brand); transform: scale(1.1); }
  </style>

      try {
        const fullUrl = new URL(url, window.location.href);
        fullUrl.searchParams.set('lang', curLang);
        return fullUrl.toString();
      } catch (e) {
        const separator = url.includes('?') ? '&' : '?';
        return url + separator + 'lang=' + encodeURIComponent(curLang);
      }
    }

    function updatePageLinks() {
      document.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || 
            href.startsWith('https://') || href.startsWith('http://') || href.startsWith('javascript:')) return;
        link.setAttribute('href', withLang(href));
      });
    }

    function navigate(p) {
      if (!p) return;
      try { localStorage.setItem('elreham_lang', curLang); } catch (e) {}
      window.location.assign(withLang(p));
    }

    function bookFromCard(dest) { window.open(`https://wa.me/201002429863?text=${encodeURIComponent(trans[curLang].wa_intro + " " + dest)}`, "_blank"); }

    function sendFlight() {
      const f = document.getElementById('w-from').value, t_ = document.getElementById('w-to').value, d = document.getElementById('w-date').value, p = document.getElementById('w-phone').value, e = document.getElementById('w-email').value;
      if(!p) return;
      fetch('https://script.google.com/macros/s/AKfycbxGgySg1t6yVUE_d6Ib2AjJU__Rm18KC44SlPkCOIrW9fvSGsKTJBapuYQ7ju2R43fQfw/exec', { method: 'POST', body: new URLSearchParams({tripType:'Flight', from:f, to:t_, date:d, phone:p, email:e}), mode: 'no-cors' });
      window.open(`https://wa.me/201002429863?text=${encodeURIComponent(trans[curLang].wa_intro + "\n🛫 " + f + " -> " + t_ + "\n📅 " + d + "\n📞 " + p)}`, "_blank");
    }

    window.onload = () => {
      const urlLang = new URLSearchParams(window.location.search).get('lang');
      let savedLang = null; try { savedLang = localStorage.getItem('elreham_lang'); } catch (e) {}
      const finalLang = (urlLang && trans[urlLang] ? urlLang : null) || (savedLang && trans[savedLang] ? savedLang : null) || 'ar';
      setLanguage(finalLang, false);
      try { localStorage.setItem('elreham_lang', finalLang); } catch (e) {}
      const today = new Date().toISOString().split('T')[0];
      const dateInput = document.getElementById('w-date'); if (dateInput) dateInput.setAttribute('min', today);
    };
  </script>
</body>
</html>
