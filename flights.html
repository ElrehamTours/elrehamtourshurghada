<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الريهام تورز | حجز طيران دولي وداخلي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; overflow-x: hidden; color: #0f172a; }
    
    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-link { color: white; font-weight: 700; transition: 0.3s; font-size: 0.9rem; white-space: nowrap; }
    .nav-link:hover, .nav-link-active { color: var(--brand); }
    
    .lang-btn { width: 36px; height: 36px; border-radius: 50%; font-weight: 900; font-size: 11px; color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .lang-btn-active { background: var(--brand) !important; transform: scale(1.1); box-shadow: 0 4px 12px rgba(242,101,34,0.4); }

    .hero-wrap { 
      position: relative; min-height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: linear-gradient(rgba(6,21,44,0.5), rgba(6,21,44,0.7)), url('flight background.jpg') center/cover;
      padding: 120px 20px 60px; overflow: hidden;
    }

    @keyframes flyAcross {
      0% { transform: translate(-20vw, 20vh) scale(0.6) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.5; } 85% { opacity: 0.5; } 
      100% { transform: translate(110vw, -15vh) scale(1.1) rotate(-10deg); opacity: 0; }
    }
    .flying-plane { position: absolute; top: 15%; left: -10%; width: clamp(250px, 35vw, 500px); opacity: 0.5; animation: flyAcross 25s linear infinite; pointer-events: none; z-index: 5; }

    .widget-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 2rem; border-top: 5px solid var(--brand); box-shadow: 0 25px 50px rgba(0,0,0,0.4); position: relative; z-index: 10; }
    .input-group { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; padding: 0.8rem 1.25rem; }
    
    .promo-card { overflow: hidden; border-radius: 2rem; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s; }
  </style>
</head>
<body class="pb-24">

  <!-- Navbar -->
  <nav class="fixed top-0 inset-x-0 z-[100] glass-nav py-3 md:py-4">
    <div class="max-w-7xl mx-auto px-4 md:px-6 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4 md:gap-8">
        <a href="index.html" class="flex items-center gap-2 group">
          <div class="w-10 h-10 md:w-12 md:h-12 bg-white rounded-xl p-1 shadow-lg group-hover:scale-105 transition-transform"><img src="logo.png" class="w-full h-full object-contain"></div>
          <div class="hidden sm:block text-white font-black text-lg md:text-xl" id="brand-name">الريهام تورز</div>
        </a>
        <div class="hidden lg:flex items-center gap-6">
          <a href="index.html" class="nav-link" id="n-home">الرئيسية</a>
          <a href="flights.html" class="nav-link nav-link-active" id="n-flights">حجز طيران</a>
          <a href="domestic-trips.html" class="nav-link" id="n-trips">رحلات داخلية</a>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex bg-white/5 p-1 rounded-full border border-white/10 backdrop-blur-md">
          <button onclick="setLanguage('de')" id="btn-de" class="lang-btn">DE</button>
          <button onclick="setLanguage('ru')" id="btn-ru" class="lang-btn">RU</button>
          <button onclick="setLanguage('en')" id="btn-en" class="lang-btn">EN</button>
          <button onclick="setLanguage('ar')" id="btn-ar" class="lang-btn">AR</button>
        </div>
      </div>
    </div>
  </nav>

  <header class="hero-wrap">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Boeing_777-300ER_transparent.png/1024px-Boeing_777-300ER_transparent.png" class="flying-plane" alt="Plane">
    <div class="max-w-5xl mx-auto w-full relative z-10 px-4 text-center">
      <h1 id="h-title" class="text-4xl md:text-7xl font-black text-white mb-4 drop-shadow-2xl">حجز طيران</h1>
      <p id="h-sub" class="text-lg md:text-2xl text-white/90 mb-10 font-bold">داخلي ودولي بأفضل الأسعار العالمية</p>
      <div class="widget-box p-6 md:p-8">
        <form onsubmit="event.preventDefault();" class="grid md:grid-cols-3 gap-4 mb-4 items-end">
          <div class="input-group text-right"><label class="text-[10px] text-[#F26522] font-black uppercase block mb-1" id="l-from">من</label><input id="w-from" type="text" placeholder="..." class="bg-transparent w-full outline-none font-bold text-white text-sm md:text-base"></div>
          <div class="input-group text-right"><label class="text-[10px] text-[#F26522] font-black uppercase block mb-1" id="l-to">إلى</label><input id="w-to" type="text" placeholder="..." class="bg-transparent w-full outline-none font-bold text-white text-sm md:text-base"></div>
          <div class="input-group text-right"><label class="text-[10px] text-[#F26522] font-black uppercase block mb-1" id="l-phone">الهاتف</label><input id="w-phone" type="tel" placeholder="..." class="bg-transparent w-full outline-none font-bold text-white text-sm md:text-base"></div>
          <button type="button" onclick="sendFlight()" class="md:col-span-3 bg-[#F26522] rounded-2xl font-black text-xl py-4 shadow-lg hover:bg-[#d9531e] transition mt-2" id="btn-book">احجز تذكرتك الآن</button>
        </form>
      </div>
    </div>
  </header>

  <section class="py-16 px-6 max-w-7xl mx-auto grid md:grid-cols-2 lg:grid-cols-4 gap-8">
    <div class="promo-card group"><img src="3.png" loading="lazy"><div class="p-6"><h3 class="text-xl font-black">Dubai</h3></div></div>
    <div class="promo-card group"><img src="6.png" loading="lazy"><div class="p-6"><h3 class="text-xl font-black">Turkey</h3></div></div>
    <div class="promo-card group"><img src="14.png" loading="lazy"><div class="p-6"><h3 class="text-xl font-black">Europe</h3></div></div>
    <div class="promo-card group"><img src="15.png" loading="lazy"><div class="p-6"><h3 class="text-xl font-black">Maldives</h3></div></div>
  </section>

  <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[150] bg-[#06152c]/90 backdrop-blur-xl p-1.5 rounded-full shadow-2xl border border-white/10 flex items-center gap-1 w-max">
    <a href="flights.html" class="px-5 md:px-8 py-2.5 rounded-full font-black text-xs md:text-sm bg-[#F26522] text-white shadow-lg pointer-events-none">✈️ <span id="f-f">الطيران</span></a>
    <a href="domestic-trips.html" class="px-5 md:px-8 py-2.5 rounded-full font-black text-xs md:text-sm text-white/70 hover:text-white transition-all">📍 <span id="f-d">رحلات داخلية</span></a>
  </div>

  <script>
    const trans = {
      ar: { n_home: "الرئيسية", n_flights: "حجز طيران", n_trips: "رحلات داخلية", h_title: "حجز طيران", h_sub: "داخلي ودولي بأفضل الأسعار العالمية", l_from: "من", l_to: "إلى", l_phone: "الهاتف", btn: "احجز الآن", f_f: "الطيران", f_d: "رحلات داخلية" },
      en: { n_home: "Home", n_flights: "Flights", n_trips: "Trips", h_title: "Flight Booking", h_sub: "International & Domestic Best Rates", l_from: "From", l_to: "To", l_phone: "Phone", btn: "Book Now", f_f: "Flights", f_d: "Trips" },
      ru: { n_home: "Главная", n_flights: "Билеты", n_trips: "Туры", h_title: "Авиабилеты", h_sub: "Лучшие цены на перелеты", l_from: "Откуда", l_to: "Куда", l_phone: "Телефон", btn: "Забронировать", f_f: "Билеты", f_d: "Туры" },
      de: { n_home: "Startseite", n_flights: "Flüge", n_trips: "Reisen", h_title: "Flugbuchung", h_sub: "Beste Flugtarife weltweit", l_from: "Von", l_to: "Nach", l_phone: "Telefon", btn: "Buchen", f_f: "Flüge", f_d: "Reisen" }
    };

    function setLanguage(l) {
      const t = trans[l] || trans.ar;
      document.documentElement.dir = (l === 'ar' ? 'rtl' : 'ltr');
      document.getElementById('n-home').innerText = t.n_home;
      document.getElementById('n-flights').innerText = t.n_flights;
      document.getElementById('n-trips').innerText = t.n_trips;
      document.getElementById('h-title').innerText = t.h_title;
      document.getElementById('h-sub').innerText = t.h_sub;
      document.getElementById('l-from').innerText = t.l_from;
      document.getElementById('l-to').innerText = t.l_to;
      document.getElementById('l-phone').innerText = t.l_phone;
      document.getElementById('btn-book').innerText = t.btn;
      document.getElementById('f-f').innerText = t.f_f;
      document.getElementById('f-d').innerText = t.f_d;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('lang-btn-active'));
      document.getElementById('btn-'+l).classList.add('lang-btn-active');
    }

    function sendFlight() {
      const from = document.getElementById('w-from').value;
      const to = document.getElementById('w-to').value;
      const phone = document.getElementById('w-phone').value;
      if(!phone) return;
      fetch('https://script.google.com/macros/s/AKfycbxGgySg1t6yVUE_d6Ib2AjJU__Rm18KC44SlPkCOIrW9fvSGsKTJBapuYQ7ju2R43fQfw/exec', { method: 'POST', body: new URLSearchParams({from, to, phone, type: 'Flight'}), mode: 'no-cors' });
      window.open(`https://wa.me/201002429863?text=Flight Request: From ${from} to ${to} - Phone: ${phone}`, "_blank");
    }
    setLanguage('ar');
  </script>
</body>
</html>
