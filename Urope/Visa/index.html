<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التأشيرات والشنجن | El Reham Tours</title>

  <!-- Google tag (gtag.js) - El Reham Tours -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-687NXW78R5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-687NXW78R5');
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { margin: 0; font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: #0f172a; overflow-x: hidden; }

    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .lang-btn { width: 38px; height: 38px; border-radius: 999px; color: white; font-weight: 900; font-size: 11px; transition: 0.3s; }
    .lang-active { background: var(--brand); box-shadow: 0 5px 15px rgba(242,101,34,.45); transform: scale(1.08); }

    /* البانر العلوي بالصورة الجديدة مع تصغير الارتفاع قليلاً */
    .top-banner {
      position: relative; width: 100%; height: 55vh; min-height: 400px;
      background: url('banner.png') center/cover no-repeat;
      display: flex; align-items: center; justify-content: center;
    }
    .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(6,21,44,0.3), rgba(6,21,44,0.85)); }

    /* صندوق التسجيل المطور: بارز ومظبوط */
    .booking-box { 
      background: white; border-radius: 2.5rem; 
      box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
      border-top: 8px solid var(--brand);
      position: relative; z-index: 30;
    }
    
    .input-wrapper { position: relative; width: 100%; }
    .input-icon { position: absolute; top: 50%; transform: translateY(-50%); right: 15px; color: #94a3b8; font-size: 1.2rem; }
    html[dir="ltr"] .input-icon { right: auto; left: 15px; }

    .visa-input {
      width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 1.25rem;
      padding: 1rem 3rem 1rem 1rem; font-weight: 700; outline: none; transition: all 0.3s ease;
    }
    html[dir="ltr"] .visa-input { padding: 1rem 1rem 1rem 3rem; }
    .visa-input:focus { background: white; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(242, 101, 34, 0.1); }

    .country-card {
      background: white; border-radius: 1.5rem; padding: 1.2rem; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; transition: 0.4s;
    }
    .country-card:hover { transform: translateY(-8px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(242,101,34,0.15); }
    .flag-icon { font-size: 3rem; margin-bottom: 0.5rem; display: block; }
  </style>
</head>

<body>

  <nav class="fixed top-0 inset-x-0 z-50 glass-nav py-3">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between text-white gap-4">
      <a id="logo-link" href="../../index.html" class="flex items-center gap-3">
        <div class="w-12 h-12 bg-white rounded-xl p-1 shadow-inner"><img src="../../logo.png" class="w-full h-full object-contain" alt="Logo"></div>
        <div class="font-black text-lg" id="brand">الريهام تورز</div>
      </a>
      <div class="hidden md:flex items-center gap-6 font-bold text-sm">
        <a id="home-link" href="../../index.html" class="hover:text-[#F26522] transition-colors">الرئيسية</a>
        <a id="trips-link" href="../../domestic-trips.html" class="hover:text-[#F26522] transition-colors">الرحلات الداخلية</a>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="setLang('ar')" id="btn-ar" class="lang-btn">AR</button>
        <button onclick="setLang('en')" id="btn-en" class="lang-btn">EN</button>
        <button onclick="setLang('ru')" id="btn-ru" class="lang-btn">RU</button>
        <button onclick="setLang('de')" id="btn-de" class="lang-btn">DE</button>
      </div>
    </div>
  </nav>

  <section class="top-banner text-center text-white px-4">
    <div class="banner-overlay"></div>
    <div class="relative z-10 max-w-6xl">
      <div class="flex justify-center mb-4">
        <span id="hero-label" class="bg-white/10 border border-white/20 px-4 py-1 rounded-full text-[10px] md:text-xs font-black uppercase tracking-widest text-[#F26522]"></span>
      </div>
      <h1 id="hero-title" class="text-2xl md:text-5xl font-black mb-3 drop-shadow-md"></h1>
      <p id="hero-desc" class="text-sm md:text-xl font-bold opacity-90 max-w-3xl mx-auto"></p>
    </div>
  </section>

  <section class="relative z-40 -mt-20 px-4 max-w-6xl mx-auto">
    <div class="booking-box p-8 md:p-10">
      <h2 id="booking-title" class="text-xl md:text-2xl font-black text-[#06152c] mb-8 text-center uppercase"></h2>
      
      <div class="grid lg:grid-cols-4 gap-6 items-end">
        <div class="lg:col-span-3 grid md:grid-cols-3 gap-6 text-right">
          
          <div class="input-wrapper">
            <label id="l-name" class="text-[11px] font-black text-[#F26522] mb-2 block px-2"></label>
            <span class="input-icon">👤</span>
            <input id="v-name" type="text" class="visa-input">
          </div>

          <div class="input-wrapper">
            <label id="l-dest" class="text-[11px] font-black text-[#F26522] mb-2 block px-2"></label>
            <span class="input-icon">📍</span>
            <input id="v-dest" type="text" class="visa-input">
          </div>

          <div class="input-wrapper">
            <label id="l-phone" class="text-[11px] font-black text-[#F26522] mb-2 block px-2"></label>
            <span class="input-icon">📱</span>
            <input id="v-phone" type="tel" class="visa-input">
          </div>

        </div>

        <button id="booking-btn" onclick="sendVisaRequest()" class="bg-[#25D366] text-white rounded-2xl font-black text-lg h-[62px] shadow-xl hover:bg-[#20b858] hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-3">
        </button>
      </div>
    </div>
  </section>

  <section class="py-20 px-4 max-w-7xl mx-auto">
    <div class="text-center mb-12">
      <h2 id="dest-title" class="text-2xl md:text-4xl font-black text-[#06152c] mb-4"></h2>
      <p id="dest-sub" class="text-slate-500 font-bold text-base md:text-lg"></p>
    </div>
    <div id="countries-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6"></div>
  </section>

  <script>
    const WA_PHONE = "201129101092";
    const visas = [
      {f:"🇺🇸", ar:"أمريكا", en:"USA", ru:"США", de:"USA"},
      {f:"🇬🇧", ar:"إنجلترا", en:"UK", ru:"Англия", de:"England"},
      {f:"🇨🇦", ar:"كندا", en:"Canada", ru:"Канада", de:"Kanada"},
      {f:"🇫🇷", ar:"فرنسا", en:"France", ru:"Франция", de:"Frankreich"},
      {f:"🇮🇹", ar:"إيطاليا", en:"Italy", ru:"Италия", de:"Italien"},
      {f:"🇪🇸", ar:"إسبانيا", en:"Spain", ru:"Испания", de:"Spanien"},
      {f:"🇩🇪", ar:"ألمانيا", en:"Germany", ru:"Германия", de:"Deutschland"},
      {f:"🇳🇱", ar:"هولندا", en:"Netherlands", ru:"Нидерланды", de:"Niederlande"},
      {f:"🇬🇷", ar:"اليونان", en:"Greece", ru:"Греция", de:"Griechenland"},
      {f:"🇭🇷", ar:"كرواتيا", en:"Croatia", ru:"Хорватия", de:"Kroatien"},
      {f:"🇹🇷", ar:"تركيا", en:"Turkey", ru:"Турция", de:"Türkei"},
      {f:"🇯🇵", ar:"اليابان", en:"Japan", ru:"Япония", de:"Japan"},
      {f:"🇨🇳", ar:"الصين", en:"China", ru:"Китай", de:"China"},
      {f:"🇹🇭", ar:"تايلاند", en:"Thailand", ru:"Таиланд", de:"Thailand"},
      {f:"🇰🇷", ar:"كوريا الجنوبية", en:"South Korea", ru:"Южная Корея", de:"Südkorea"},
      {f:"🇲🇦", ar:"المغرب", en:"Morocco", ru:"Марокко", de:"Marokko"},
      {f:"🇹🇳", ar:"تونس", en:"Tunisia", ru:"Тунис", de:"Tunesien"},
      {f:"🇩🇿", ar:"الجزائر", en:"Algeria", ru:"Алжир", de:"Algerien"},
      {f:"🇧🇷", ar:"البرازيل", en:"Brazil", ru:"Бразилия", de:"Brasilien"},
      {f:"🇦🇺", ar:"أستراليا", en:"Australia", ru:"Австралия", de:"Australien"}
    ];

    const content = {
      ar: {
        dir: "rtl", brand: "الريهام تورز", home: "الرئيسية", trips: "الرحلات الداخلية",
        heroL: "مركز تأشيرات معتمد",
        heroT: "تأشيرات سياحة وتجهيز ملفات شنجن",
        heroD: "تجهيز ملفك بالكامل لجميع الجنسيات مع ضمان أعلى نسب القبول وحجز الفنادق عالمياً.",
        bookT: "استعلم عن تأشيرتك الآن",
        lN: "الاسم", lD: "الوجهة", lP: "الهاتف", pN: "اكتب اسمك", pD: "دولة السفر", pP: "رقمك", bookB: "تواصل واتساب 💬",
        destT: "أهم وجهات السفر", destS: "نخدمك في استخراج التأشيرات للدول التالية وكافة دول العالم",
        waMsg: "أهلاً الريهام تورز، أريد استشارة بخصوص تأشيرة لـ: "
      },
      en: {
        dir: "ltr", brand: "El Reham Tours", home: "Home", trips: "Domestic Trips",
        heroL: "Certified Visa Center",
        heroT: "Tourist Visas & Schengen Files",
        heroD: "Full document preparation for all nationalities with high approval rates.",
        bookT: "Inquire About Your Visa",
        lN: "Name", lD: "Destination", lP: "Phone", pN: "Full name", pD: "Country", pP: "Your phone", bookB: "WhatsApp Us 💬",
        destT: "Top Travel Destinations", destS: "We assist you in obtaining visas for the following countries",
        waMsg: "Hello El Reham Tours, I need a visa consultation for: "
      },
      ru: {
        dir: "ltr", brand: "El Reham Tours", home: "Главная", trips: "Внутренние туры",
        heroL: "Визовый центр",
        heroT: "Визовые услуги и Шенген",
        heroD: "Полная подготовка документов для всех национальностей по всему миру.",
        bookT: "Запросить визу сейчас",
        lN: "Имя", lD: "Направление", lP: "Телефон", pN: "Ваше имя", pD: "Страна", pP: "Ваш номер", bookB: "WhatsApp 💬",
        destT: "Популярные направления", destS: "Мы оформляем визы в следующие страны и по всему миру",
        waMsg: "Здравствуйте, El Reham Tours, мне нужна консультация по визе в: "
      },
      de: {
        dir: "ltr", brand: "El Reham Tours", home: "Startseite", trips: "Inlandsreisen",
        heroL: "Visa-Zentrum",
        heroT: "Visadienste & Schengen",
        heroD: "Komplette Aktenvorbereitung für جميع Nationalitäten weltweit.",
        bookT: "Visum jetzt anfragen",
        lN: "Name", lD: "Reiseziel", lP: "Telefon", pN: "Name", pD: "Zielland", pP: "Nummer", bookB: "WhatsApp 💬",
        destT: "Top-Reiseziele", destS: "Wir unterstützen Sie bei der Erteilung von Visa",
        waMsg: "Hallo El Reham Tours, ich benötige eine Visumberatung für: "
      }
    };

    function setLang(lang) {
      const t = content[lang] || content.ar;
      document.documentElement.lang = lang; document.documentElement.dir = t.dir;

      document.getElementById("brand").innerText = t.brand;
      document.getElementById("home-link").innerText = t.home;
      document.getElementById("trips-link").innerText = t.trips;
      document.getElementById("hero-label").innerText = t.heroL;
      document.getElementById("hero-title").innerText = t.heroT;
      document.getElementById("hero-desc").innerText = t.heroD;
      
      document.getElementById("booking-title").innerText = t.bookT;
      document.getElementById("l-name").innerText = t.lN;
      document.getElementById("l-dest").innerText = t.lD;
      document.getElementById("l-phone").innerText = t.lP;
      document.getElementById("v-name").placeholder = t.pN;
      document.getElementById("v-dest").placeholder = t.pD;
      document.getElementById("v-phone").placeholder = t.pP;
      document.getElementById("booking-btn").innerText = t.bookB;

      document.getElementById("dest-title").innerText = t.destT;
      document.getElementById("dest-sub").innerText = t.destS;

      document.getElementById('countries-grid').innerHTML = visas.map(v => `
        <div class="country-card">
          <span class="flag-icon">${v.f}</span>
          <h4 class="font-black text-[#06152c] text-lg">${v[lang] || v.ar}</h4>
        </div>
      `).join('');

      document.getElementById("logo-link").href = "../../index.html?lang=" + lang;
      document.getElementById("home-link").href = "../../index.html?lang=" + lang;
      document.getElementById("trips-link").href = "../../domestic-trips.html?lang=" + lang;

      document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("lang-active"));
      document.getElementById("btn-" + lang).classList.add("lang-active");
      localStorage.setItem("elreham_lang", lang);
    }

    function sendVisaRequest() {
      const lang = localStorage.getItem("elreham_lang") || "ar";
      const t = content[lang] || content.ar;
      const name = document.getElementById("v-name").value || "-";
      const dest = document.getElementById("v-dest").value || "-";
      const phone = document.getElementById("v-phone").value || "-";
      const msg = `${t.waMsg}${dest}\nName: ${name}\nPhone: ${phone}`;
      window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      setLang(urlParams.get("lang") || localStorage.getItem("elreham_lang") || "ar");
    };
  </script>
</body>
</html>
