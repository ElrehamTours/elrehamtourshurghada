<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التأشيرات والشنجن | El Reham Tours</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { margin: 0; font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: #0f172a; overflow-x: hidden; }

    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .lang-btn { width: 38px; height: 38px; border-radius: 999px; color: white; font-weight: 900; font-size: 11px; transition: 0.3s; }
    .lang-active { background: var(--brand); box-shadow: 0 5px 15px rgba(242,101,34,.45); transform: scale(1.08); }

    .top-banner {
      position: relative; width: 100%; height: 60vh; min-height: 450px;
      background: radial-gradient(circle at center, #1a365d 0%, var(--navy) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(6,21,44,.2), rgba(6,21,44,.95)); }

    .country-card {
      background: white; border-radius: 1.5rem; padding: 1.5rem; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; transition: 0.4s;
    }
    .country-card:hover { transform: translateY(-8px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(242,101,34,0.15); }
    .flag-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }

    .booking-box { background: white; border-radius: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border-top: 6px solid var(--brand); }
    
    .special-label { background: linear-gradient(90deg, var(--brand), #ff8c42); color: white; padding: 5px 15px; border-radius: 50px; font-size: 13px; font-weight: 900; }
  </style>
</head>

<body>

  <nav class="fixed top-0 inset-x-0 z-50 glass-nav py-3">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between text-white gap-4">
      <a id="logo-link" href="../../index.html" class="flex items-center gap-3">
        <div class="w-12 h-12 bg-white rounded-xl p-1"><img src="../../logo.png" class="w-full h-full object-contain" alt="Logo"></div>
        <div class="font-black text-lg" id="brand">الريهام تورز</div>
      </a>
      <div class="hidden md:flex items-center gap-6 font-bold text-sm">
        <a id="home-link" href="../../index.html" class="hover:text-[#F26522] transition-colors">الرئيسية</a>
        <a id="trips-link" href="../../domestic-trips.html" class="hover:text-[#F26522] transition-colors">الرحلات الداخلية</a>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="setLang('ar')" id="btn-ar" class="lang-btn">AR</button>
        <button onclick="setLang('en')" id="btn-en" class="lang-btn">EN</button>
        <button onclick="setLang('ru')" id="btn-ru" class="lang-btn">RU</button>
        <button onclick="setLang('de')" id="btn-de" class="lang-btn">DE</button>
      </div>
    </div>
  </nav>

  <section class="top-banner text-center text-white px-4">
    <div class="banner-overlay"></div>
    <div class="relative z-10 max-w-6xl">
      <div class="flex justify-center mb-5"><span class="special-label uppercase tracking-tighter">Professional Visa Center</span></div>
      <h1 id="hero-title" class="text-3xl md:text-6xl font-black mb-3"></h1>
      <p id="hero-desc" class="text-base md:text-xl font-bold opacity-80"></p>
    </div>
  </section>

  <section class="relative z-10 -mt-16 px-4 max-w-5xl mx-auto">
    <div class="booking-box p-6 md:p-10">
      <div class="grid md:grid-cols-4 gap-4 items-end">
        <div class="md:col-span-3 grid md:grid-cols-3 gap-4 text-right">
          <div><label id="l-name" class="text-[10px] text-brand font-black block mb-1 px-2"></label><input id="v-name" class="w-full bg-slate-50 border-slate-100 border rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] transition-all"></div>
          <div><label id="l-dest" class="text-[10px] text-brand font-black block mb-1 px-2"></label><input id="v-dest" class="w-full bg-slate-50 border-slate-100 border rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] transition-all"></div>
          <div><label id="l-phone" class="text-[10px] text-brand font-black block mb-1 px-2"></label><input id="v-phone" class="w-full bg-slate-50 border-slate-100 border rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] transition-all"></div>
        </div>
        <button onclick="sendVisaRequest()" class="bg-[#F26522] text-white rounded-2xl font-black text-lg h-[60px] shadow-lg hover:bg-[#d9531e] hover:scale-[1.02] active:scale-95 transition-all">تواصل واتساب</button>
      </div>
    </div>
  </section>

  <section class="py-20 px-4 max-w-7xl mx-auto">
    <div class="text-center mb-16">
      <h2 id="dest-title" class="text-3xl md:text-5xl font-black text-[#06152c] mb-4"></h2>
      <p id="dest-sub" class="text-slate-500 font-bold text-lg"></p>
    </div>
    <div id="countries-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6"></div>
  </section>

  <section class="py-16 bg-slate-50 px-4">
    <div class="max-w-4xl mx-auto bg-white border border-slate-200 p-8 rounded-[3rem] text-center shadow-sm">
      <h3 id="spec-title" class="text-2xl font-black text-navy mb-4"></h3>
      <p id="spec-desc" class="text-slate-600 font-bold leading-relaxed"></p>
      <div id="spec-flags" class="flex justify-center gap-4 mt-6 text-3xl">🇵🇸 🇸🇾 🇱🇾 🇸🇩 🇾🇪</div>
    </div>
  </section>

  <script>
    const WA_PHONE = "201129101092";
    const visaList = [
      { f: "🇪🇺", ar: "الشنجن", en: "Schengen", ru: "Шенген", de: "Schengen" },
      { f: "🇦🇪", ar: "دبي", en: "Dubai", ru: "Дубай", de: "Dubai" },
      { f: "🇸🇦", ar: "السعودية", en: "Saudi Arabia", ru: "Саудовская Аравия", de: "Saudi-Arabien" },
      { f: "🇹🇷", ar: "تركيا", en: "Turkey", ru: "Турция", de: "Türkei" },
      { f: "🇺🇸", ar: "أمريكا", en: "USA", ru: "США", de: "USA" },
      { f: "🇬🇧", ar: "بريطانيا", en: "UK", ru: "Великобритания", de: "UK" }
    ];

    const content = {
      ar: {
        dir: "rtl", brand: "الريهام تورز", home: "الرئيسية", trips: "الرحلات الداخلية",
        heroT: "استخراج تأشيرات سياحة وتجهيز ملفات شنجن",
        heroD: "وجهتك القادمة تبدأ من هنا.. نخدم جميع الجنسيات بدقة واحترافية عالية لضمان القبول.",
        bookT: "جهز ملفك الآن", lN: "الاسم", lD: "الوجهة", lP: "الهاتف",
        destT: "أهم الوجهات والخدمات", destS: "نحن خبراء في استخراج تأشيرات الدول التالية وكافة دول العالم",
        specT: "خدمة خاصة لجميع الجنسيات",
        specD: "نتميز بتجهيز ملفات التأشيرات للأخوة الفلسطينيين (وثائق مصرية وغيرها)، السوريين، الليبيين، السودانيين، واليمنيين.",
        waMsg: "أهلاً الريهام تورز، أريد استشارة بخصوص تأشيرة لـ: "
      },
      en: {
        dir: "ltr", brand: "El Reham Tours", home: "Home", trips: "Domestic Trips",
        heroT: "Tourist Visas & Schengen File Preparation",
        heroD: "Your next destination starts here. We serve all nationalities with high precision to ensure approval.",
        bookT: "Prepare Your File", lN: "Name", lD: "Destination", lP: "Phone",
        destT: "Key Destinations", destS: "We are experts in visas for the following countries and worldwide",
        specT: "Special Service for All Nationalities",
        specD: "We specialize in visa files for Palestinians, Syrians, Libyans, Sudanese, and Yemenis.",
        waMsg: "Hello El Reham Tours, I need a visa consultation for: "
      }
      // يمكن تكرار نفس النمط لـ RU و DE
    };

    function setLang(lang) {
      const t = content[lang] || content.ar;
      document.documentElement.lang = lang; document.documentElement.dir = t.dir;
      
      document.getElementById("brand").innerText = t.brand;
      document.getElementById("home-link").innerText = t.home;
      document.getElementById("trips-link").innerText = t.trips;
      document.getElementById("hero-title").innerText = t.heroT;
      document.getElementById("hero-desc").innerText = t.heroD;
      document.getElementById("dest-title").innerText = t.destT;
      document.getElementById("dest-sub").innerText = t.destS;
      document.getElementById("spec-title").innerText = t.specT;
      document.getElementById("spec-desc").innerText = t.specD;

      document.getElementById("l-name").innerText = t.lN;
      document.getElementById("l-dest").innerText = t.lD;
      document.getElementById("l-phone").innerText = t.lP;

      document.getElementById('countries-grid').innerHTML = visaList.map(v => `
        <div class="country-card">
          <span class="flag-icon">${v.f}</span>
          <h4 class="font-black text-[#06152c] text-xl">${v[lang] || v.ar}</h4>
        </div>
      `).join('');

      document.getElementById("logo-link").href = "../../index.html?lang=" + lang;
      document.getElementById("home-link").href = "../../index.html?lang=" + lang;
      document.getElementById("trips-link").href = "../../domestic-trips.html?lang=" + lang;

      document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("lang-active"));
      document.getElementById("btn-" + lang).classList.add("lang-active");
      localStorage.setItem("elreham_lang", lang);
    }

    function sendVisaRequest() {
      const lang = localStorage.getItem("elreham_lang") || "ar";
      const t = content[lang] || content.ar;
      const name = document.getElementById("v-name").value || "-";
      const dest = document.getElementById("v-dest").value || "-";
      const phone = document.getElementById("v-phone").value || "-";
      const msg = `${t.waMsg} ${dest}\nName: ${name}\nPhone: ${phone}`;
      window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      setLang(urlParams.get("lang") || localStorage.getItem("elreham_lang") || "ar");
    };
  </script>
</body>
</html>
