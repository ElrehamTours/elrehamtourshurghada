<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التأشيرات والشنجن | El Reham Tours</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { margin: 0; font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: #0f172a; overflow-x: hidden; }

    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .lang-btn { width: 38px; height: 38px; border-radius: 999px; color: white; font-weight: 900; font-size: 11px; transition: 0.3s; }
    .lang-active { background: var(--brand); box-shadow: 0 5px 15px rgba(242,101,34,.45); transform: scale(1.08); }

    .top-banner {
      position: relative; width: 100%; height: 60vh; min-height: 450px;
      background: radial-gradient(circle at center, #1a365d 0%, var(--navy) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(6,21,44,.2), rgba(6,21,44,.95)); }

    .country-card {
      background: white; border-radius: 1.5rem; padding: 1.5rem; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; transition: 0.4s;
    }
    .country-card:hover { transform: translateY(-8px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(242,101,34,0.15); }
    .flag-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }

    .booking-box { background: white; border-radius: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border-top: 6px solid var(--brand); }
    
    .special-label { background: linear-gradient(90deg, var(--brand), #ff8c42); color: white; padding: 5px 15px; border-radius: 50px; font-size: 13px; font-weight: 900; }
  </style>
</head>

      <div class="grid md:grid-cols-4 gap-4 items-end">

          <div>
            <label id="l-name" class="text-[10px] text-[#F26522] font-black block mb-1 px-2"></label>
            <input id="v-name" class="w-full bg-slate-50 border-slate-100 border rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] transition-all">
          </div>
          <div>

          </div>
          <div>

        </div>

      </div>
    </div>
  </section>

  <section class="py-20 px-4 max-w-7xl mx-auto">
    <div class="text-center mb-16">
      <h2 id="dest-title" class="text-3xl md:text-5xl font-black text-[#06152c] mb-4"></h2>
      <p id="dest-sub" class="text-slate-500 font-bold text-lg"></p>
    </div>
    <div id="countries-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6"></div>
  </section>

  <section class="py-16 bg-slate-50 px-4">

    </div>
  </section>
