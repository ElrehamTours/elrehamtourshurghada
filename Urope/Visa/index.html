<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التأشيرات والشنجن | El Reham Tours</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { margin: 0; font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: #0f172a; overflow-x: hidden; }

    .glass-nav { background: rgba(6, 21, 44, 0.98); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .lang-btn { width: 38px; height: 38px; border-radius: 999px; color: white; font-weight: 900; font-size: 11px; transition: 0.3s; }
    .lang-active { background: var(--brand); box-shadow: 0 5px 15px rgba(242,101,34,.45); transform: scale(1.08); }

    .top-banner {
      position: relative; width: 100%; height: 70vh; min-height: 500px;
      background: radial-gradient(circle at center, #1a365d 0%, var(--navy) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(6,21,44,.2), rgba(6,21,44,.95)); }

    .visa-badge { background: rgba(242, 101, 34, 0.1); color: var(--brand); border: 1px solid var(--brand); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; }
    
    .country-card {
      background: white; border-radius: 1.5rem; padding: 1.5rem; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; transition: 0.3s;
    }
    .country-card:hover { transform: translateY(-8px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(242,101,34,0.12); }

    .booking-box { background: white; border-radius: 2.5rem; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border-top: 6px solid var(--brand); }
    
    .service-step { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; padding: 2rem; transition: 0.3s; }
    .service-step:hover { background: rgba(255,255,255,0.06); transform: scale(1.02); }
  </style>
</head>

<body>

  <nav class="fixed top-0 inset-x-0 z-50 glass-nav py-3">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between text-white gap-4">
      <a id="logo-link" href="../../index.html" class="flex items-center gap-3">
        <div class="w-12 h-12 bg-white rounded-xl p-1 shadow-inner"><img src="../../logo.png" class="w-full h-full object-contain" alt="Logo"></div>
        <div class="font-black text-lg" id="brand">الريهام تورز</div>
      </a>
      <div class="hidden md:flex items-center gap-6 font-bold text-sm">
        <a id="home-link" href="../../index.html" class="hover:text-[#F26522] transition-colors">الرئيسية</a>
        <a id="trips-link" href="../../domestic-trips.html" class="hover:text-[#F26522] transition-colors">الرحلات الداخلية</a>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="setLang('ar')" id="btn-ar" class="lang-btn">AR</button>
        <button onclick="setLang('en')" id="btn-en" class="lang-btn">EN</button>
        <button onclick="setLang('ru')" id="btn-ru" class="lang-btn">RU</button>
        <button onclick="setLang('de')" id="btn-de" class="lang-btn">DE</button>
      </div>
    </div>
  </nav>

  <section class="top-banner text-center text-white px-4">
    <div class="banner-overlay"></div>
    <div class="relative z-10 max-w-5xl">
      <div class="flex justify-center mb-6"><span class="visa-badge uppercase tracking-widest">Premium Visa Concierge</span></div>
      <h1 id="hero-title" class="text-4xl md:text-7xl font-black mb-4 drop-shadow-lg"></h1>
      <p id="hero-desc" class="text-lg md:text-2xl font-bold opacity-90 max-w-3xl mx-auto leading-relaxed"></p>
    </div>
  </section>

  <section class="relative z-10 -mt-20 px-4 max-w-6xl mx-auto">
    <div class="booking-box p-6 md:p-10">
      <h2 id="booking-title" class="text-2xl md:text-3xl font-black text-[#06152c] mb-8 text-center"></h2>
      <div class="grid md:grid-cols-4 gap-4">
        <input id="v-name" class="bg-slate-50 border border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] focus:bg-white transition-all" placeholder="">
        <input id="v-dest" class="bg-slate-50 border border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] focus:bg-white transition-all" placeholder="">
        <input id="v-phone" class="bg-slate-50 border border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-[#F26522] focus:bg-white transition-all" placeholder="">
        <button onclick="sendVisaRequest()" class="bg-[#F26522] text-white rounded-2xl font-black text-lg h-[60px] shadow-lg hover:bg-[#d9531e] hover:scale-[1.02] active:scale-95 transition-all">واتساب مباشر</button>
      </div>
    </div>
  </section>

  <section class="py-24 px-4 max-w-7xl mx-auto">
    <div class="text-center mb-16">
      <h2 id="dest-title" class="text-3xl md:text-5xl font-black text-[#06152c] mb-4"></h2>
      <p id="dest-sub" class="text-slate-500 font-bold text-lg"></p>
    </div>
    <div id="countries-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 md:gap-6"></div>
  </section>

  <section class="py-24 px-4 bg-[#06152c] text-white rounded-t-[4rem]">
    <div class="max-w-7xl mx-auto">
      <div class="text-center mb-16">
        <h2 id="steps-title" class="text-3xl md:text-5xl font-black mb-4"></h2>
        <p id="steps-sub" class="text-white/60 font-bold text-lg"></p>
      </div>
      <div class="grid md:grid-cols-3 gap-8">
        <div class="service-step"><div class="text-5xl mb-6">📑</div><h3 id="st1-t" class="text-2xl font-black text-[#F26522] mb-3"></h3><p id="st1-d" class="text-white/70 font-bold leading-loose"></p></div>
        <div class="service-step"><div class="text-5xl mb-6">📅</div><h3 id="st2-t" class="text-2xl font-black text-[#F26522] mb-3"></h3><p id="st2-d" class="text-white/70 font-bold leading-loose"></p></div>
        <div class="service-step"><div class="text-5xl mb-6">🛡️</div><h3 id="st3-t" class="text-2xl font-black text-[#F26522] mb-3"></h3><p id="st3-d" class="text-white/70 font-bold leading-loose"></p></div>
      </div>
    </div>
  </section>

  <script>
    const WA_PHONE = "201129101092";
    const destinations = [
      { n: "ar", list: ["الشنجن 🇪🇺", "دبي 🇦🇪", "السعودية 🇸🇦", "تركيا 🇹🇷", "أمريكا 🇺🇸", "بريطانيا 🇬🇧"] },
      { n: "en", list: ["Schengen 🇪🇺", "Dubai 🇦🇪", "Saudi Arabia 🇸🇦", "Turkey 🇹🇷", "USA 🇺🇸", "UK 🇬🇧"] },
      { n: "ru", list: ["Шенген 🇪🇺", "Дубай 🇦🇪", "Саудовская Аравия 🇸🇦", "Турция 🇹🇷", "США 🇺🇸", "Великобритания 🇬🇧"] },
      { n: "de", list: ["Schengen 🇪🇺", "Dubai 🇦🇪", "Saudi-Arabien 🇸🇦", "Türkei 🇹🇷", "USA 🇺🇸", "Großbritannien 🇬🇧"] }
    ];

    const content = {
      ar: {
        dir: "rtl", brand: "الريهام تورز", home: "الرئيسية", trips: "الرحلات الداخلية",
        heroT: "تأشيرات سياحة وتجهيز ملفات شنجن",
        heroD: "سافر لأي مكان في العالم بكل سهولة.. نحن نتولى تجهيز ملفك بالكامل من الألف إلى الياء لجميع الجنسيات.",
        bookT: "استعلم عن تأشيرتك وجهز ملفك الآن", nameP: "الاسم بالكامل", destP: "وجهة السفر المطلوبة", phoneP: "رقم الهاتف",
        destT: "أهم الوجهات التي نخدمها", destS: "نستخرج تأشيرات السياحة للدول التالية وغيرها الكثير حول العالم",
        stepsT: "لماذا تختار الريهام تورز لتأشيرتك؟", stepsS: "نقدم حلولاً متكاملة تضمن لك أعلى نسب قبول للملفات",
        st1t: "تجهيز ملفات الشنجن", st1d: "إعداد احترافي لملفات أوروبا (Schengen) بما يطابق اشتراطات السفارات لضمان القبول.",
        st2t: "حجز المواعيد والتأمين", st2d: "حجز أسرع المواعيد المتاحة، مع توفير تأمين سفر دولي وحجوزات فندقية وطيران مؤكدة.",
        st3t: "لكل الجنسيات", st3d: "نقدم خدماتنا لجميع الجنسيات المقيمة والراغبة في السفر للسياحة أو العمل أو الزيارة.",
        waMsg: "أهلاً الريهام تورز، أريد الاستفسار عن تأشيرة لدولة: "
      },
      en: {
        dir: "ltr", brand: "El Reham Tours", home: "Home", trips: "Domestic Trips",
        heroT: "Tourist Visas & Schengen File Preparation",
        heroD: "Travel anywhere in the world with ease. We handle your full document preparation for all nationalities.",
        bookT: "Inquire About Your Visa & Prepare Your File", nameP: "Full Name", destP: "Destination Country", phoneP: "Phone Number",
        destT: "Our Top Destinations", destS: "We process tourist visas for the following countries and many more worldwide",
        stepsT: "Why Choose Us for Your Visa?", stepsS: "We provide integrated solutions ensuring the highest approval rates",
        st1t: "Schengen File Prep", st1d: "Professional preparation of European files following strict embassy requirements.",
        st2t: "Appointments & Insurance", st2d: "Booking the fastest available appointments, with international travel insurance & confirmed bookings.",
        st3t: "All Nationalities", st3d: "Our services are available to all nationalities seeking tourism, business, or visit visas.",
        waMsg: "Hello El Reham Tours, I'd like to inquire about a visa for: "
      },
      ru: {
        dir: "ltr", brand: "El Reham Tours", home: "Главная", trips: "Внутренние туры",
        heroT: "Туристические визы и подготовка документов",
        heroD: "Путешествуйте по всему миру с легкостью. Мы подготовим все документы для всех национальностей.",
        bookT: "Узнайте о визе и подготовьте документы сейчас", nameP: "Полное имя", destP: "Страна назначения", phoneP: "Номер телефона",
        destT: "Наши основные направления", destS: "Мы оформляем туристические визы в следующие страны и многие другие",
        stepsT: "Почему выбирают нас?", stepsS: "Мы предлагаем комплексные решения, гарантирующие высокий уровень одобрения",
        st1t: "Подготовка к Шенгену", st1d: "Профессиональная подготовка европейских файлов в соответствии с требованиями посольств.",
        st2t: "Запись и страхование", st2d: "Бронирование ближайших дат, международная страховка и подтвержденная бронь отеля.",
        st3t: "Для всех национальностей", st3d: "Наши услуги доступны для граждан всех стран для туризма или бизнеса.",
        waMsg: "Здравствуйте, El Reham Tours, я хочу узнать о визе в: "
      },
      de: {
        dir: "ltr", brand: "El Reham Tours", home: "Startseite", trips: "Inlandsreisen",
        heroT: "Visadienste & Schengen-Vorbereitung",
        heroD: "Reisen Sie problemlos überall hin. Wir übernehmen die komplette Aktenvorbereitung für alle Nationalitäten.",
        bookT: "Visa anfragen & Unterlagen vorbereiten", nameP: "Vollständiger Name", destP: "Zielland", phoneP: "Telefonnummer",
        destT: "Unsere Top-Reiseziele", destS: "Wir bearbeiten Visumanträge für die folgenden Länder und viele mehr",
        stepsT: "Warum uns wählen?", stepsS: "Wir bieten integrierte Lösungen für höchste Erfolgsquoten",
        st1t: "Schengen-Vorbereitung", st1d: "Professionelle Erstellung von EU-Akten gemäß den strengen Anforderungen der Botschaften.",
        st2t: "Termine & Versicherung", st2d: "Schnellstmögliche Termine, Reiseversicherung und bestätigte Buchungen.",
        st3t: "Alle Nationalitäten", st3d: "Unsere Dienstleistungen stehen allen Nationalitäten für Tourismus oder Business zur Verfügung.",
        waMsg: "Hallo El Reham Tours, ich möchte mich nach einem Visum erkundigen für: "
      }
    };

    function setLang(lang) {
      const t = content[lang] || content.ar;
      document.documentElement.lang = lang; document.documentElement.dir = t.dir;

      document.getElementById("brand").innerText = t.brand;
      document.getElementById("home-link").innerText = t.home;
      document.getElementById("trips-link").innerText = t.trips;
      document.getElementById("hero-title").innerText = t.heroT;
      document.getElementById("hero-desc").innerText = t.heroD;
      document.getElementById("booking-title").innerText = t.bookT;
      document.getElementById("dest-title").innerText = t.destT;
      document.getElementById("dest-sub").innerText = t.destS;
      document.getElementById("steps-title").innerText = t.stepsT;
      document.getElementById("steps-sub").innerText = t.stepsS;
      document.getElementById("st1-t").innerText = t.st1t; document.getElementById("st1-d").innerText = t.st1d;
      document.getElementById("st2-t").innerText = t.st2t; document.getElementById("st2-d").innerText = t.st2d;
      document.getElementById("st3-t").innerText = t.st3t; document.getElementById("st3-d").innerText = t.st3d;
      
      document.getElementById("v-name").placeholder = t.nameP;
      document.getElementById("v-dest").placeholder = t.destP;
      document.getElementById("v-phone").placeholder = t.phoneP;

      const langDest = destinations.find(x => x.n === lang).list;
      document.getElementById('countries-grid').innerHTML = langDest.map(c => `
        <div class="country-card"><h4 class="font-black text-[#06152c] text-lg md:text-xl">${c}</h4></div>
      `).join('');

      document.getElementById("logo-link").href = "../../index.html?lang=" + lang;
      document.getElementById("home-link").href = "../../index.html?lang=" + lang;
      document.getElementById("trips-link").href = "../../domestic-trips.html?lang=" + lang;

      document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("lang-active"));
      document.getElementById("btn-" + lang).classList.add("lang-active");
      localStorage.setItem("elreham_lang", lang);
    }

    function sendVisaRequest() {
      const lang = localStorage.getItem("elreham_lang") || "ar";
      const t = content[lang];
      const name = document.getElementById("v-name").value || "-";
      const dest = document.getElementById("v-dest").value || "-";
      const phone = document.getElementById("v-phone").value || "-";
      const msg = `${t.waMsg} ${dest}\nName: ${name}\nPhone: ${phone}`;
      window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      setLang(urlParams.get("lang") || localStorage.getItem("elreham_lang") || "ar");
    };
  </script>
</body>
</html>
