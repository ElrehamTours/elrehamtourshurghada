<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الريهام تورز | الرئيسية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #F26522; --navy: #06152c; }
    body { font-family: "Cairo", "Tajawal", sans-serif; background: #fcfaf7; color: var(--navy); overflow-x: hidden; }
    
    .hero-simple { background: linear-gradient(135deg, var(--navy), #0a1d38); padding: 15px 0; text-align: center; color: white; position: relative; }
    
    /* شريط اللغات المطور */
    .lang-bar { background: white; border-bottom: 1px solid #eee; padding: 12px 0; }
    .lang-full-btn { 
      font-weight: 700; 
      font-size: 0.95rem; 
      padding: 8px 16px; 
      border-radius: 50px; 
      transition: 0.3s; 
      color: var(--navy); 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      border: 1px solid transparent;
    }
    .lang-full-btn:hover { background: #fff3ec; color: var(--brand); border-color: var(--brand); transform: translateY(-1px); }
    .lang-full-active { background: var(--brand) !important; color: white !important; box-shadow: 0 8px 15px rgba(242,101,34,0.3); }

    @keyframes flyAcross {
      0% { transform: translate(-20vw, 20vh) scale(0.6) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.5; } 100% { transform: translate(110vw, -15vh) scale(1.1) rotate(-10deg); opacity: 0; }
    }
    .flying-plane { position: absolute; top: 15%; left: -10%; width: clamp(250px, 35vw, 500px); opacity: 0.5; animation: flyAcross 25s linear infinite; pointer-events: none; z-index: 5; }

    .widget-box { background: rgba(10, 29, 56, 0.85); backdrop-filter: blur(16px); border-radius: 2rem; border-top: 5px solid var(--brand); box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7); }
    .input-group { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.25rem; padding: 1rem 1.25rem; transition: 0.3s; }
  </style>
</head>
<body class="pb-24">

  <div id="toast-container" class="fixed top-32 left-1/2 transform -translate-x-1/2 z-[200] pointer-events-none text-center"></div>

  <!-- Navbar -->
  <header class="hero-simple sticky top-0 z-[60] shadow-md">
    <div class="absolute top-0 rtl:right-4 ltr:left-4 w-24 h-32 md:w-32 md:h-40 bg-white rounded-b-2xl p-2 flex items-center justify-center z-[70] shadow-sm cursor-pointer" onclick="navigate('index.html')">
      <img src="logo.png" alt="Logo" class="w-full h-full object-contain">
    </div>
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
      <div class="rtl:pr-28 ltr:pl-28 py-2">
        <div id="hero-title" class="font-black text-2xl md:text-3xl">الريهام تورز</div>
        <p id="hero-desc" class="text-xs text-[#F26522] font-bold uppercase tracking-widest mt-1">بداية ونهاية كل رحلة</p>
      </div>
      <div id="welcome-msg" class="text-white/90 font-bold text-sm hidden lg:block">أهلاً بك في بوابتك المثالية للسياحة والطيران</div>
    </div>
  </header>

  <!-- شريط اللغات الذكي المطور -->
  <section class="lang-bar sticky top-[78px] md:top-[85px] z-50 shadow-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-center gap-2 md:gap-4 flex-wrap">
      <div class="flex items-center gap-2 text-gray-400 font-bold text-xs uppercase border-r border-gray-200 pr-4 mr-2 hidden md:flex">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="txt-lang-select">اللغة</span>
      </div>

      <button onclick="setLanguage('ar')" id="fbtn-ar" class="lang-full-btn">
        <span class="text-lg">🇪🇬</span> العربية
      </button>
      <button onclick="setLanguage('en')" id="fbtn-en" class="lang-full-btn">
        <span class="text-lg">🇬🇧</span> English
      </button>
      <button onclick="setLanguage('ru')" id="fbtn-ru" class="lang-full-btn">
        <span class="text-lg">🇷🇺</span> Русский
      </button>
      <button onclick="setLanguage('de')" id="fbtn-de" class="lang-full-btn">
        <span class="text-lg">🇩🇪</span> Deutsch
      </button>
    </div>
  </section>

  <main class="relative w-full min-h-[85vh] bg-cover bg-center bg-fixed" style="background-image: url('flight background.jpg');">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px] z-0"></div>
    <img src="image_c2dae4.png" alt="Plane" class="flying-plane z-10" />

    <div class="relative z-20 pt-12 pb-16 px-4 flex flex-col items-center text-white">
      
      <!-- كروت الخدمات الموحدة -->
      <div class="max-w-4xl w-full grid md:grid-cols-2 gap-6 mb-16">
        <div class="bg-white/95 rounded-[1.5rem] p-6 text-center text-navy shadow-lg cursor-pointer transform transition hover:scale-[1.02]" onclick="navigate('domestic-trips.html')">
          <h2 id="domestic-title" class="text-xl font-black mb-2 text-[#06152c]">رحلات داخلية وسفاري</h2>
          <p id="domestic-desc" class="text-slate-500 text-sm mb-5 leading-relaxed">استمتع بجمال مصر بأفضل الأسعار.</p>
          <span id="domestic-btn" class="bg-[#F26522] text-white px-8 py-2.5 rounded-full font-bold text-sm shadow-md">اكتشف الرحلات</span>
        </div>
        <div class="bg-white/95 rounded-[1.5rem] p-6 text-center text-navy shadow-lg cursor-pointer transform transition hover:scale-[1.02]" onclick="navigate('flights.html')">
          <h2 id="flights-title" class="text-xl font-black mb-2 text-[#06152c]">حجز طيران وعروض</h2>
          <p id="flights-desc" class="text-slate-500 text-sm mb-5 leading-relaxed">أفضل عروض الطيران الدولي والداخلي.</p>
          <span id="flights-btn" class="bg-[#F26522] text-white px-8 py-2.5 rounded-full font-bold text-sm shadow-md">صفحة العروض</span>
        </div>
      </div>

      <!-- مربع الحجز الموحد (3 حقول فقط لضمان صحة الروابط) -->
      <div class="widget-box p-6 md:p-10 max-w-5xl w-full">
        <h2 id="booking-title" class="text-center font-black text-3xl md:text-5xl mb-8 drop-shadow-md">سجل الآن</h2>
        <form onsubmit="event.preventDefault();" class="space-y-5 text-right">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="input-group">
              <label id="l-from" class="text-[10px] text-[#F26522] font-black uppercase block mb-1">من</label>
              <input id="w-from" type="text" placeholder="..." class="bg-transparent w-full font-bold text-white outline-none">
            </div>
            <div class="input-group">
              <label id="l-to" class="text-[10px] text-[#F26522] font-black uppercase block mb-1">إلى</label>
              <input id="w-to" type="text" placeholder="..." class="bg-transparent w-full font-bold text-white outline-none">
            </div>
            <div class="input-group">
              <label id="l-phone" class="text-[10px] text-[#F26522] font-black uppercase block mb-1">الهاتف</label>
              <input id="w-phone" type="tel" placeholder="..." class="bg-transparent w-full font-bold text-white outline-none">
            </div>
          </div>
          <button type="button" onclick="sendMain()" id="btn-book" class="w-full bg-[#F26522] h-[64px] rounded-2xl font-black text-xl uppercase shadow-lg hover:bg-[#d9531e] transition-all">احجز الآن</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const trans = {
      ar: { dir: 'rtl', l_select: "اللغة", title: "الريهام تورز", desc: "بداية ونهاية كل رحلة", welcome: "أهلاً بك في بوابتك المثالية", domestic_t: "رحلات داخلية وسفاري", domestic_d: "استمتع بجمال مصر بأفضل الأسعار.", domestic_b: "اكتشف الرحلات", flights_t: "حجز طيران وعروض", flights_d: "أفضل عروض الطيران الدولي والداخلي.", flights_b: "صفحة العروض", book_t: "سجل الآن", l_from: "من", l_to: "إلى", l_phone: "الهاتف", btn: "احجز الآن", wa: "طلب حجز من الرئيسية:" },
      en: { dir: 'ltr', l_select: "Language", title: "Elreham Tours", desc: "Start & end of every trip", welcome: "Welcome to your ideal gateway", domestic_t: "Domestic Trips", domestic_d: "Enjoy Egypt's beauty at best rates.", domestic_b: "Explore Trips", flights_t: "Flight Booking", flights_d: "Best international & domestic deals.", flights_b: "View Offers", book_t: "Register Now", l_from: "From", l_to: "To", l_phone: "Phone", btn: "Book Now", wa: "Inquiry from Home:" },
      ru: { dir: 'ltr', l_select: "Язык", title: "Elreham Tours", desc: "Начало и конец поездки", welcome: "Добро пожаловать к нам", domestic_t: "Внутренние туры", domestic_d: "Красоты Египта по лучшим ценам.", domestic_b: "Узнать больше", flights_t: "Авиабилеты", flights_d: "Лучшие международные рейсы.", flights_b: "Акции", book_t: "Забронировать", l_from: "Откуда", l_to: "Куда", l_phone: "Телефон", btn: "Забронировать", wa: "Запрос с главной:" },
      de: { dir: 'ltr', l_select: "Sprache", title: "Elreham Tours", desc: "Anfang & Ende jeder Reise", welcome: "Willkommen bei uns", domestic_t: "Inlandsreisen", domestic_d: "Ägyptens Schönheit zum Bestpreis.", domestic_b: "Entdecken", flights_t: "Flugbuchung", flights_d: "Beste internationale Flugtarife.", flights_b: "Angebote", book_t: "Jetzt Buchen", l_from: "Von", l_to: "Nach", l_phone: "Telefon", btn: "Buchen", wa: "Anfrage von Startseite:" }
    };

    let curLang = 'ar';

    function setLanguage(l) {
      curLang = l; const t = trans[l]; document.documentElement.dir = t.dir;
      document.getElementById('txt-lang-select').innerText = t.l_select;
      document.getElementById('hero-title').innerText = t.title;
      document.getElementById('hero-desc').innerText = t.desc;
      document.getElementById('welcome-msg').innerText = t.welcome;
      document.getElementById('domestic-title').innerText = t.domestic_t;
      document.getElementById('domestic-desc').innerText = t.domestic_d;
      document.getElementById('domestic-btn').innerText = t.domestic_b;
      document.getElementById('flights-title').innerText = t.flights_t;
      document.getElementById('flights-desc').innerText = t.flights_d;
      document.getElementById('flights-btn').innerText = t.flights_b;
      document.getElementById('booking-title').innerText = t.book_t;
      document.getElementById('l-from').innerText = t.l_from;
      document.getElementById('l-to').innerText = t.l_to;
      document.getElementById('l-phone').innerText = t.l_phone;
      document.getElementById('btn-book').innerText = t.btn;
      
      document.querySelectorAll('.lang-full-btn').forEach(b => b.classList.remove('lang-full-active'));
      document.getElementById('fbtn-'+l).classList.add('lang-full-active');
    }

    // دالة التنقل التي تحافظ على كود اللغة في الرابط
    function navigate(page) {
      window.location.href = `${page}?lang=${curLang}`;
    }

    function sendMain() {
      const f = document.getElementById('w-from').value, t_ = document.getElementById('w-to').value, p = document.getElementById('w-phone').value;
      if(!p) return;
      fetch('https://script.google.com/macros/s/AKfycbxGgySg1t6yVUE_d6Ib2AjJU__Rm18KC44SlPkCOIrW9fvSGsKTJBapuYQ7ju2R43fQfw/exec', { method: 'POST', body: new URLSearchParams({tripType: 'Home Inquiry', from: f, to: t_, phone: p}), mode: 'no-cors' });
      window.open(`https://wa.me/201002429863?text=${encodeURIComponent(trans[curLang].wa + " " + (f||'?') + " -> " + (t_||'?'))}`, "_blank");
    }

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const l = urlParams.get('lang');
      setLanguage(l && trans[l] ? l : 'ar');
    };
  </script>
</body>
</html>
